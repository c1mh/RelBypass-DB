<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REL BYPASS - ADMIN PANEL</title>
    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-card: #1F2833;
            --border-color: #45A29E;
            --text-primary: #FFFFFF;
            --text-secondary: #C5C6C7;
            --accent-color: #66FCF1;
            --error-color: #EC4E4E;
            --success-color: #2ECC71;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            text-align: center; 
            padding-top: 60px; 
            margin: 0; 
        }
        .container { 
            background-color: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            width: 95%; 
            max-width: 480px; 
            margin: 0 auto; 
            padding: 40px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); 
            text-align: right;
        }
        h1 { 
            color: var(--text-primary); 
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px; 
            text-align: center;
            letter-spacing: 0.5px;
        }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 14px;
            font-weight: 500; 
            color: var(--text-secondary); 
        }
        input[type="text"], input[type="number"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--bg-main); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 6px; 
            color: var(--text-primary); 
            font-size: 15px; 
            text-align: center; 
            box-sizing: border-box; 
            margin-bottom: 24px; 
            transition: border-color 0.2s;
        }
        input:focus { 
            border-color: var(--accent-color); 
            outline: none; 
        }
        .btn { 
            background-color: var(--accent-color); 
            color: var(--bg-main); 
            border: none; 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: background-color 0.2s, color 0.2s; 
            margin-top: 10px; 
        }
        .btn:hover { 
            background-color: var(--text-primary); 
            color: var(--bg-main); 
        }
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 0;
            width: auto;
            white-space: nowrap;
            padding: 0 20px;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        .log-box { 
            background-color: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 15px; 
            margin-top: 24px; 
            text-align: right; 
            font-family: monospace; 
            border-radius: 6px; 
            color: var(--success-color); 
            font-size: 13px; 
            max-height: 120px; 
            overflow-y: auto; 
            display: none; 
            direction: ltr;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لوحة التحكم والمفاتيح السحابية</h1>
        
        <label>رمز الوصول السري (GitHub Token):</label>
        <input type="password" id="githubToken" autocomplete="off">

        <label>كود الـ VIP المدفوع:</label>
        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
            <input type="text" id="newKeyInput" style="margin-bottom: 0;">
            <button class="btn btn-secondary" onclick="generateKeyFromAdmin()">توليد عشوائي</button>
        </div>

        <label>مدة الصلاحية بالأيام:</label>
        <input type="number" id="keyDaysInput" min="1">

        <button class="btn" onclick="injectKeyToGitHubServer()">صناعة وحقن الكود في السيرفر السحابي</button>
        
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        function generateKeyFromAdmin() {
            const randomStr = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById("newKeyInput").value = "REL-VIP-" + randomStr;
        }

        function safeBtoa(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        async function injectKeyToGitHubServer() {
            const token = document.getElementById("githubToken").value.trim();
            const rawKey = document.getElementById("newKeyInput").value.trim().toUpperCase();
            const days = parseInt(document.getElementById("keyDaysInput").value);
            const logBox = document.getElementById("logBox");

            if (!token || !rawKey || isNaN(days) || days <= 0) {
                alert("يرجى ملء كافة الخانات وتحديد عدد أيام صحيح.");
                return;
            }

            const searchKey = rawKey.toLowerCase();
            logBox.style.display = "block";
            logBox.innerText = "Connecting to GitHub API, fetching current dataset...";

            const repoOwner = "c1mh";
            const repoName = "RelBypass-DB";
            const filePath = "keys_db.json";
            const url = `https://github.com{repoOwner}/${repoName}/contents/${filePath}`;

            try {
                const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
                if (!getRes.ok) throw new Error("Unauthorized or invalid token.");
                
                const fileData = await getRes.json();
                const sha = fileData.sha;
                
                let currentContent = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                currentContent[searchKey] = {
                    status: "unused",
                    duration_days: days,
                    hwid: ""
                };

                const updatedContentBase64 = safeBtoa(JSON.stringify(currentContent, null, 4));

                logBox.innerText += "\nInjecting record, updating database...";

                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Admin Generated Key: ${rawKey} for ${days} Days`,
                        content: updatedContentBase64,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    logBox.innerHTML += `<br><span style="color: var(--success-color);">Success: Key [ ${rawKey} ] has been injected for [ ${days} ] days.</span>`;
                    alert("تم ترحيل المفتاح وحفظ البيانات السحابية بنجاح.");
                } else {
                    throw new Error("Failed to commit changes.");
                }

            } catch (err) {
                logBox.innerHTML += `<br><span style="color: var(--error-color);">Error: ${err.message}</span>`;
                alert("فشل الإجراء السحابي. يرجى التحقق من الصلاحيات والاتصال.");
            }
        }
    </script>
</body>
</html>
