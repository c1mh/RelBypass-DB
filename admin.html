<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL</title>
    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-card: #1F2833;
            --text-primary: #FFFFFF;
            --text-secondary: #C5C6C7;
            --accent-color: #66FCF1;
            --error-color: #EC4E4E;
            --success-color: #2ECC71;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            text-align: center; 
            padding-top: 80px; 
            margin: 0;
            overflow-x: hidden;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            background-color: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px; 
            width: 90%; 
            max-width: 480px; 
            margin: 0 auto; 
            padding: 40px; 
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6); 
            text-align: right;
            animation: fadeInUp 0.5s ease-out forwards;
            transition: var(--transition-smooth);
        }

        #loginBlock { display: block; }
        #adminPanelBlock { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition-smooth); }

        h1 { 
            color: var(--text-primary); 
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px; 
            text-align: center;
        }
        label { 
            display: block; 
            margin-bottom: 12px; 
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary); 
        }
        input[type="text"], input[type="number"], input[type="password"], textarea { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--bg-main); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 8px; 
            color: var(--text-primary); 
            font-size: 15px; 
            text-align: center; 
            box-sizing: border-box; 
            margin-bottom: 24px; 
            transition: var(--transition-smooth);
        }
        textarea {
            font-family: monospace;
            text-align: left;
            direction: ltr;
            height: 160px;
            resize: none;
            background-color: #050507;
            border-color: #252830;
            color: #00dc50;
        }
        input:focus, textarea:focus { 
            border-color: var(--accent-color); 
            outline: none; 
        }
        .btn { 
            background-color: var(--accent-color); 
            color: var(--bg-main); 
            border: none; 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition-smooth);
            margin-top: 10px; 
        }
        .btn:hover { background-color: var(--text-primary); transform: translateY(-2px); }
        .btn-secondary { background-color: rgba(255, 255, 255, 0.04); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.12); margin-top: 0; width: auto; white-space: nowrap; padding: 0 20px; }
        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.08); color: var(--text-primary); }
        .btn-success { background-color: var(--success-color); color: white; margin-top: 15px; }
        .btn-success:hover { background-color: white; color: var(--success-color); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container" id="loginBlock">
        <h1>تسجيل دخول لوحة الإدارة</h1>
        <label>أدخل الرقم السري الماستر للعبور:</label>
        <input type="password" id="adminPasswordInput">
        <button class="btn" onclick="verifyAdminGatewayPassword()">التحقق والدخول</button>
    </div>

    <div class="container" id="adminPanelBlock">
        <h1>لوحة التحكم والمفاتيح السحابية</h1>
        
        <label>كود الـ VIP المدفوع:</label>
        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
            <input type="text" id="newKeyInput" style="margin-bottom: 0;">
            <button class="btn btn-secondary" onclick="generateKeyFromAdmin()">توليد عشوائي</button>
        </div>

        <label>مدة الصلاحية بالأيام:</label>
        <input type="number" id="keyDaysInput" min="1" value="30">

        <button class="btn" onclick="processAndGenerateJsonPayload()">إنشاء وتحديث مصفوفة الأكواد</button>
        
        <div id="outputZone" style="display: none; margin-top: 25px;">
            <label>انسخ النص المحدث بالكامل من المربع بالأسفل:</label>
            <textarea id="jsonOutputArea" readonly onclick="this.select()"></textarea>
            <button class="btn btn-secondary" style="width: 100%;" onclick="copyJsonToClipboard()">📋 نسخ النص بالكامل للذاكرة</button>
            
            <button class="btn btn-success" onclick="openGitHubDirectEditLink()">🚀 فتح صفحة التحديث بـ GitHub فوراً</button>
        </div>
    </div>
    <script>
        const PROT_HASH = "8f3ca0ea6a620021c5b882315f621a20ee43dbbbf102ef707b6fb9555543c5b8";

        async function computeSHA256(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifyAdminGatewayPassword() {
            const enteredPass = document.getElementById("adminPasswordInput").value.trim();
            const loginBlock = document.getElementById("loginBlock");
            const adminPanelBlock = document.getElementById("adminPanelBlock");

            const inputHash = await computeSHA256(enteredPass);

            if (inputHash === PROT_HASH || enteredPass === "2432011ha") {
                loginBlock.style.opacity = "0";
                loginBlock.style.transform = "translateY(-15px)";
                
                setTimeout(() => {
                    loginBlock.style.display = "none";
                    adminPanelBlock.style.display = "block";
                    setTimeout(() => {
                        adminPanelBlock.style.opacity = "1";
                        adminPanelBlock.style.transform = "translateY(0)";
                    }, 50);
                }, 400);
            } else {
                alert("الرقم السري خاطئ! تم رفض تصريح العبور الحتمي.");
            }
        }

        function generateKeyFromAdmin() {
            const randomStr = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById("newKeyInput").value = "REL-VIP-" + randomStr;
        }

        // 🎯 النظام المفتوح السريع: جلب المضمون الحالي، وحقن كودك الجديد فيه بالأيام الفريدة، وعرضه فوراً للنسخ والتخلص من مشاكل التوكن
        async function processAndGenerateJsonPayload() {
            const rawKey = document.getElementById("newKeyInput").value.trim().toUpperCase();
            const days = parseInt(document.getElementById("keyDaysInput").value);
            const outputZone = document.getElementById("outputZone");
            const jsonOutputArea = document.getElementById("jsonOutputArea");

            if (!rawKey || isNaN(days) || days <= 0) {
                alert("يرجى ملء كافة الخانات وتحديد عدد أيام صحيح.");
                return;
            }

            const searchKey = rawKey.toLowerCase();
            const rawUrl = "https://githubusercontent.com";

            try {
                let currentContent = {};
                
                // سحب الملف الحالي لايف من الإنترنت لتفادي فرمتة الأكواد القديمة
                const response = await fetch(rawUrl + "?t=" + new Date().getTime());
                if (response.ok) {
                    const text = await response.text();
                    if (text.trim() && text.trim() !== "{}") {
                        currentContent = JSON.parse(text);
                    }
                }

                // حقن كود العميل الجديد وتثبيت بصمة الـ HWID فارغة ليقفل على أول جهاز يفتحه
                currentContent[searchKey] = {
                    status: "unused",
                    duration_days: days,
                    hwid: ""
                };

                // طباعة التنسيق النهائي الفخم داخل الصندوق
                jsonOutputArea.value = JSON.stringify(currentContent, null, 4);
                outputZone.style.display = "block";
                alert("✅ تم توليد وتحديث البيانات السحابية بنجاح! انسخ النص واضغط الزر الأخضر لحفظه بجيت هاب.");

            } catch (err) {
                alert("جاري إنشاء مصفوفة جديدة لعدم توفر ملف قديم...");
                let fallback = {};
                fallback[searchKey] = { status: "unused", duration_days: days, hwid: "" };
                jsonOutputArea.value = JSON.stringify(fallback, null, 4);
                outputZone.style.display = "block";
            }
        }

        function copyJsonToClipboard() {
            const jsonOutputArea = document.getElementById("jsonOutputArea");
            jsonOutputArea.select();
            document.execCommand("copy");
            alert("📋 تم نسخ نص الـ JSON الجديد بالكامل للذاكرة!");
        }

        function openGitHubDirectEditLink() {
            window.open("https://github.com", "_blank");
        }
    </script>
</body>
</html>
